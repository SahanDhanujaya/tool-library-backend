
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          - id: user-service
            uri: lb://user-service
            predicates:
              - Path=/user-service/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
